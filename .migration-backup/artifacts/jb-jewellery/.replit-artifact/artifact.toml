kind = "web"
previewPath = "/"
title = "JB Jewellery Collection"
version = "1.0.0"
id = "artifacts/jb-jewellery"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26210

[services.development]
run = "pnpm --filter @workspace/jb-jewellery run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jb-jewellery", "run", "build" ]
publicDir = "artifacts/jb-jewellery/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26210"
BASE_PATH = "/"
